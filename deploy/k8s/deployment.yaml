---
# Reference snapshot — see deploy/k8s/README.md.
# Source-of-truth: fulviofreitas/ff-k8s/k8s-homelab/kubernetes/apps/holyclaude/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holyclaude
  namespace: holyclaude
  labels:
    app.kubernetes.io/name: holyclaude
    app.kubernetes.io/part-of: k8s-homelab
spec:
  replicas: 1
  strategy:
    type: Recreate  # single-user; PVCs are RWO/RWX-with-one-attacher
  selector:
    matchLabels:
      app.kubernetes.io/name: holyclaude
  template:
    metadata:
      labels:
        app.kubernetes.io/name: holyclaude
    spec:
      containers:
        - name: holyclaude
          # Pinned to immutable semver; bumped by manifest-bump workflow.
          image: ghcr.io/fulviofreitas/holyclaude:latest
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: TZ
              value: UTC
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN    # Chromium sandboxing + bubblewrap (bwrap)
                - SYS_PTRACE   # Debugging / process tracing
            seccompProfile:
              type: Unconfined  # Required for Chromium
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: claude-home
              mountPath: /home/claude
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            httpGet: {path: /, port: 3001}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /, port: 3001}
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "12"
              memory: 12Gi
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: holyclaude-workspace
        - name: claude-home
          persistentVolumeClaim:
            claimName: holyclaude-home
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: holyclaude-workspace
  namespace: holyclaude
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: holyclaude-home
  namespace: holyclaude
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
