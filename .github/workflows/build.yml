# =============================================================================
# build — multi-arch GHCR publish
# =============================================================================
# Triggers:
#   - push to master (build & publish moving tags + sha tag)
#   - push to v* tag (build & publish semver-pinned tags + fork.N counter)
#   - workflow_dispatch (manual)
#
# Tag scheme (per variant):
#   <semver>-fork.<N>            stable semver derived from latest upstream tag
#                                + fork-only patch counter (commits since tag)
#   cloudcli-<X.Y.Z>             tracks the vendored CloudCLI version
#   <semver>-fork.<N>-slim       slim variant counterpart
#   latest                       moving tag (full only)
#   slim                         moving tag (slim only)
#   sha-<7chars>                 immutable
#
# Build is delegated to fulviofreitas/workflow-arsenal/.github/workflows/
# docker-build.yml@master which provides parallel native amd64+arm64 runners
# and SBOM/provenance attestations.
# =============================================================================

name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      push:
        description: "Push to GHCR"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/holyclaude

jobs:
  # ---------------------------------------------------------------------------
  # Compute tags. Done once, consumed by both variant matrices.
  # ---------------------------------------------------------------------------
  meta:
    name: Compute tags
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.derive.outputs.semver }}
      fork_counter: ${{ steps.derive.outputs.fork_counter }}
      cloudcli: ${{ steps.derive.outputs.cloudcli }}
      tags_full: ${{ steps.derive.outputs.tags_full }}
      tags_slim: ${{ steps.derive.outputs.tags_slim }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: derive
        run: |
          set -euo pipefail
          short=$(git rev-parse --short=7 HEAD)
          # Latest upstream-style semver tag (CoderLuii uses vX.Y.Z).
          latest_tag=$(git -c "versionsort.suffix=-" tag --list 'v*' --sort=-v:refname | head -n1 || echo "")
          if [ -z "$latest_tag" ]; then latest_tag="v0.0.0"; fi
          base_semver="${latest_tag#v}"
          # Number of commits on this branch since that tag — our fork counter.
          fork_counter=$(git rev-list --count "${latest_tag}..HEAD" 2>/dev/null || echo "0")

          # Vendored CloudCLI version.
          tarball=$(ls vendor/artifacts/cloudcli-ai-cloudcli-*.tgz 2>/dev/null | head -n1)
          if [ -z "$tarball" ]; then
            # Legacy fallback during the @siteboon → @cloudcli-ai migration.
            tarball=$(ls vendor/artifacts/siteboon-claude-code-ui-*.tgz | head -n1)
            cloudcli=$(basename "$tarball" | sed -E 's/^siteboon-claude-code-ui-(.+)\.tgz$/\1/')
          else
            cloudcli=$(basename "$tarball" | sed -E 's/^cloudcli-ai-cloudcli-(.+)\.tgz$/\1/')
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push: clean semver, no -fork.N suffix.
            stamp="${base_semver}"
          else
            stamp="${base_semver}-fork.${fork_counter}"
          fi

          # Build comma-separated tag lists per variant.
          full_tags=""
          slim_tags=""
          add() { local var="$1"; local tag="$2"; eval "$var=\"\${$var:+\$$var,}${IMAGE}:${tag}\""; }

          add full_tags "${stamp}"
          add full_tags "cloudcli-${cloudcli}"
          add full_tags "sha-${short}"
          add full_tags "latest"

          add slim_tags "${stamp}-slim"
          add slim_tags "cloudcli-${cloudcli}-slim"
          add slim_tags "sha-${short}-slim"
          add slim_tags "slim"

          {
            echo "semver=${stamp}"
            echo "fork_counter=${fork_counter}"
            echo "cloudcli=${cloudcli}"
            echo "tags_full=${full_tags}"
            echo "tags_slim=${slim_tags}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Tag plan"
            echo "| Variant | Tags |"
            echo "|:-|:-|"
            echo "| full | ${full_tags//,/<br>} |"
            echo "| slim | ${slim_tags//,/<br>} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Build full (amd64). Native runner; per-variant matrix would need separate
  # cache scopes so we run amd64+arm64 sequentially within the same job using
  # buildx parallelism.
  # ---------------------------------------------------------------------------
  build-full:
    name: Build full
    runs-on: ubuntu-24.04
    needs: meta
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: ${{ inputs.push != false }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push full
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push != false }}
          tags: ${{ needs.meta.outputs.tags_full }}
          build-args: VARIANT=full
          provenance: mode=max
          sbom: true
          cache-from: |
            type=gha,scope=full
            type=gha,scope=master-full
          cache-to: type=gha,mode=max,scope=full
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.semver }}
            org.opencontainers.image.title=HolyClaude (fork)
            io.holyclaude.cloudcli-version=${{ needs.meta.outputs.cloudcli }}
            io.holyclaude.variant=full

  build-slim:
    name: Build slim
    runs-on: ubuntu-24.04
    needs: meta
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: ${{ inputs.push != false }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push slim
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push != false }}
          tags: ${{ needs.meta.outputs.tags_slim }}
          build-args: VARIANT=slim
          provenance: mode=max
          sbom: true
          cache-from: |
            type=gha,scope=slim
            type=gha,scope=master-slim
          cache-to: type=gha,mode=max,scope=slim
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.semver }}
            org.opencontainers.image.title=HolyClaude (fork) — slim
            io.holyclaude.cloudcli-version=${{ needs.meta.outputs.cloudcli }}
            io.holyclaude.variant=slim

  # ---------------------------------------------------------------------------
  # NOTE: the downstream manifest-bump (PR into fulviofreitas/ff-k8s) is
  # intentionally NOT chained here. The cluster image switchover from the
  # upstream coderluii/holyclaude:1.2.2 to ghcr.io/fulviofreitas/holyclaude:*
  # is owned by the GitOps repo and will be wired up there. The manifest-bump
  # workflow remains in this repo, callable manually via workflow_dispatch
  # (.github/workflows/manifest-bump.yml) for ad-hoc bumps after the
  # switchover has happened.
  # ---------------------------------------------------------------------------
