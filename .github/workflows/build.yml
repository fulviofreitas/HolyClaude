# =============================================================================
# build — multi-arch GHCR publish (slim only)
# =============================================================================
# Triggers:
#   - push to master (build & publish moving tags + sha tag)
#   - push to v* tag (build & publish semver-pinned tags + fork.N counter)
#   - workflow_dispatch (manual)
#
# Tag scheme (slim is the only variant we ship):
#   <semver>-fork.<N>            stable semver derived from latest upstream tag
#                                + fork-only patch counter (commits since tag)
#   cloudcli-<X.Y.Z>             tracks the vendored CloudCLI version
#   sha-<7chars>                 immutable
#   latest                       moving tag
#
# The upstream Dockerfile still has the `ARG VARIANT=full` blocks
# (Junie/OpenCode/Azure CLI/PDF/video tooling) — we just don't build that
# variant. Re-add a build-full job + a -full tag suffix here if it ever
# becomes worth the build minutes again.
# =============================================================================

name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      push:
        description: "Push to GHCR"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/holyclaude

jobs:
  meta:
    name: Compute tags
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.derive.outputs.semver }}
      fork_counter: ${{ steps.derive.outputs.fork_counter }}
      cloudcli: ${{ steps.derive.outputs.cloudcli }}
      tags: ${{ steps.derive.outputs.tags }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: derive
        run: |
          set -euo pipefail
          short=$(git rev-parse --short=7 HEAD)
          # Latest upstream-style semver tag (CoderLuii uses vX.Y.Z).
          latest_tag=$(git -c "versionsort.suffix=-" tag --list 'v*' --sort=-v:refname | head -n1 || echo "")
          if [ -z "$latest_tag" ]; then latest_tag="v0.0.0"; fi
          base_semver="${latest_tag#v}"
          # Number of commits on this branch since that tag — our fork counter.
          fork_counter=$(git rev-list --count "${latest_tag}..HEAD" 2>/dev/null || echo "0")

          # Vendored CloudCLI version.
          tarball=$(ls vendor/artifacts/cloudcli-ai-cloudcli-*.tgz 2>/dev/null | head -n1)
          if [ -z "$tarball" ]; then
            tarball=$(ls vendor/artifacts/siteboon-claude-code-ui-*.tgz | head -n1)
            cloudcli=$(basename "$tarball" | sed -E 's/^siteboon-claude-code-ui-(.+)\.tgz$/\1/')
          else
            cloudcli=$(basename "$tarball" | sed -E 's/^cloudcli-ai-cloudcli-(.+)\.tgz$/\1/')
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            stamp="${base_semver}"
          else
            stamp="${base_semver}-fork.${fork_counter}"
          fi

          tags=""
          add() { tags="${tags:+$tags,}${IMAGE}:$1"; }
          add "${stamp}"
          add "cloudcli-${cloudcli}"
          add "sha-${short}"
          add "latest"

          {
            echo "semver=${stamp}"
            echo "fork_counter=${fork_counter}"
            echo "cloudcli=${cloudcli}"
            echo "tags=${tags}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Tag plan"
            echo
            echo '```'
            echo "${tags//,/$'\n'}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build & push
    runs-on: ubuntu-24.04
    needs: meta
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: ${{ inputs.push != false }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push != false }}
          tags: ${{ needs.meta.outputs.tags }}
          build-args: VARIANT=slim
          provenance: mode=max
          sbom: true
          cache-from: |
            type=gha,scope=slim
            type=gha,scope=master-slim
          cache-to: type=gha,mode=max,scope=slim
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.semver }}
            org.opencontainers.image.title=HolyClaude (fork)
            io.holyclaude.cloudcli-version=${{ needs.meta.outputs.cloudcli }}
            io.holyclaude.variant=slim

  # ---------------------------------------------------------------------------
  # No downstream manifest-bump from here — image-tag tracking in
  # fulviofreitas/ff-k8s is handled by Renovate in that repo.
  # ---------------------------------------------------------------------------
