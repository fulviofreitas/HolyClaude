# =============================================================================
# 🧪 ci — pull-request gate + release trigger
# =============================================================================
# Chain: 🧪 ci -> 🚀 release (workflow_run) -> tag push v* -> 🐳 docker-publish
#
# Stages:
#   1. 📝 commitlint        validates conventional-commit messages (gate 1)
#   2. 🧹 lint              hadolint + shellcheck + yamllint        (gate 2)
#      🐳 build-and-smoke   amd64 image build + smoke test          (gate 2)
#   3. ✅ ci-success        single required check for branch protection
#
# release.yml uses `workflow_run: ci, conclusion=success` to gate semantic
# release. A failing gate on master never publishes.
# =============================================================================

name: 🧪 ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # 1️⃣ commitlint — gate 1
  # ===========================================================================
  # Validates that every commit follows conventional commits. Required for
  # semantic-release to compute the right version bump downstream.
  # ===========================================================================
  commitlint:
    name: 📝 Commit lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📝 Validate commits
        uses: fulviofreitas/workflow-arsenal/.github/actions/commitlint@master
        with:
          from-sha: ${{ github.event.pull_request.base.sha }}
          to-sha: ${{ github.event.pull_request.head.sha }}

  # ===========================================================================
  # 2️⃣ lint — gate 2
  # ===========================================================================
  lint:
    name: 🧹 Lint (hadolint + shellcheck + yamllint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: commitlint
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐳 Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          # The upstream Dockerfile has historical violations (DL3008 unpinned
          # apt packages, DL3013 pip pins missing) that we are not fixing in
          # this fork — they belong upstream. Fail only on critical issues.
          failure-threshold: error
          ignore: DL3002,DL3008,DL3013,DL3015,DL3018,DL4006,SC2086,DL3059,DL3025

      - name: 🐚 Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

      - name: 📋 Yamllint (.github)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/
          config_data: |
            extends: default
            rules:
              line-length: { max: 200, allow-non-breakable-inline-mappings: true }
              truthy: { check-keys: false }
              comments: { min-spaces-from-content: 1 }
              document-start: disable
              indentation: { spaces: 2, indent-sequences: consistent }

  # ===========================================================================
  # 2️⃣ build-and-smoke — gate 2 (parallel with lint)
  # ===========================================================================
  build-and-smoke:
    name: 🐳 Build & smoke (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: commitlint
    strategy:
      fail-fast: false
      matrix:
        # Slim only. The upstream Dockerfile retains its `ARG VARIANT=full`
        # blocks (Junie/OpenCode/Azure CLI/PDF/video/chart tooling) and we
        # don't carry a divergence on it — we just stop building that
        # variant. Re-add `full` here if it ever becomes worth the build
        # minutes again.
        variant: [slim]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 💾 Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏗️ Build (${{ matrix.variant }}, amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: holyclaude:ci-${{ matrix.variant }}
          platforms: linux/amd64
          build-args: VARIANT=${{ matrix.variant }}
          cache-from: |
            type=gha,scope=ci-${{ matrix.variant }}
            type=gha,scope=master-${{ matrix.variant }}-amd64
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.variant }}

      - name: 🧪 Smoke test
        run: ./scripts/ci/smoke-test.sh holyclaude:ci-${{ matrix.variant }}

      - name: 🛡️ Trivy scan (HIGH,CRITICAL vulns — advisory)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: holyclaude:ci-${{ matrix.variant }}
          format: sarif
          output: trivy-${{ matrix.variant }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Vulnerability scan only — secret scanner false-positives on npm
          # cache files; misconfig/license scanners aren't relevant here.
          scanners: vuln
          skip-dirs: "/home/claude/.npm,/root/.npm,/tmp/vendor"
          # Advisory rather than blocking. The image vendors a long tail of
          # npm + Debian packages whose transitive deps (picomatch, uuid,
          # prismjs, brace-expansion …) routinely have HIGH CVEs we cannot
          # patch without forking each upstream package — and the runtime
          # is behind Cloudflare Tunnel + OAuth so the realistic blast
          # radius doesn't justify gating every CloudCLI bump on the npm
          # ecosystem's vuln-of-the-week. The SARIF still uploads to the
          # Security tab so we keep visibility; gate later if a
          # straightforward fix path emerges.
          # TODO(security): flip exit-code to "1" (blocking) once the
          # prerequisites in docs/security/code-scanning-remediation-plan.md
          # land. Specifically:
          #   - Phase 1 (imagemagick, ~40 alerts) is merged
          #   - Phase 2 (npm transitives, ~16 alerts) is merged
          #   - Open HIGH/CRITICAL alert count for the trivy-slim category
          #     in the Security tab is below the threshold defined in the
          #     plan's "Phase 3 — gate flip" section
          # When flipping, also remove this entire advisory comment block
          # and update the step name to drop "advisory". Severity stays
          # HIGH,CRITICAL (LOW/MEDIUM noise is not worth gating on).
          exit-code: "0"

      - name: 🔇 Filter Trivy SARIF (drop note-level findings)
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.variant)) != ''
        run: |
          set -euo pipefail
          f="trivy-${{ matrix.variant }}.sarif"
          before=$(jq '[.runs[].results[]] | length' "$f")
          jq '(.runs[].results) |= map(select(.level != "note"))' "$f" > "$f.tmp"
          mv "$f.tmp" "$f"
          after=$(jq '[.runs[].results[]] | length' "$f")
          echo "::notice::Trivy SARIF filter — kept $after of $before findings (dropped $((before - after)) note-level)"

      - name: 📤 Upload Trivy SARIF
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.variant)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}

  # ===========================================================================
  # 3️⃣ ci-success — single required check for branch protection
  # ===========================================================================
  # Aggregates the parallel gates above. release.yml's workflow_run trigger
  # checks `conclusion: success` on the parent ci run, which is determined
  # by whether every needed job succeeded — so this aggregator is also what
  # gates the release pipeline.
  # ===========================================================================
  ci-success:
    name: ✅ ci-success
    runs-on: ubuntu-latest
    needs: [commitlint, lint, build-and-smoke]
    if: always()
    steps:
      - name: 🔍 Verify required jobs passed
        run: |
          set -euo pipefail
          COMMIT="${{ needs.commitlint.result }}"
          LINT="${{ needs.lint.result }}"
          BUILD="${{ needs.build-and-smoke.result }}"
          {
            echo "## ✅ ci-success"
            echo
            echo "| Stage | Job | Result |"
            echo "|---|---|---|"
            echo "| 1️⃣ | 📝 commitlint | ${COMMIT} |"
            echo "| 2️⃣ | 🧹 lint | ${LINT} |"
            echo "| 2️⃣ | 🐳 build-and-smoke | ${BUILD} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$COMMIT" == "success" && "$LINT" == "success" && "$BUILD" == "success" ]]; then
            echo "✅ All required checks passed."
            exit 0
          fi
          echo "::error::ci-success failed (commitlint=$COMMIT, lint=$LINT, build-and-smoke=$BUILD)"
          exit 1
