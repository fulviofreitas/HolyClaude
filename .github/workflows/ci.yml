# =============================================================================
# CI — pull-request gate
# =============================================================================
# Runs on every PR + on push to master. Validates:
#   - Dockerfile lints (hadolint)
#   - Shell scripts lint (shellcheck)
#   - Image builds for amd64 (no push)
#   - Smoke test passes inside the freshly built image
#   - Trivy scan: no new HIGH/CRITICAL CVEs
#
# Push-to-registry happens separately in `build.yml` after this gate has
# succeeded on `master`.
# =============================================================================

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (hadolint + shellcheck + yamllint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          # The upstream Dockerfile has historical violations (DL3008 unpinned
          # apt packages, DL3013 pip pins missing) that we are not fixing in
          # this fork — they belong upstream. Fail only on critical issues.
          failure-threshold: error
          ignore: DL3008,DL3013,DL3015,DL3018,DL4006,SC2086,DL3059,DL3025

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

      - name: Yamllint (.github)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/
          config_data: |
            extends: default
            rules:
              line-length: { max: 200, allow-non-breakable-inline-mappings: true }
              truthy: { check-keys: false }
              comments: { min-spaces-from-content: 1 }
              document-start: disable
              indentation: { spaces: 2, indent-sequences: consistent }

  build-and-smoke:
    name: Build & smoke (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        variant: [slim, full]
    steps:
      - uses: actions/checkout@v6

      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (${{ matrix.variant }}, amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: holyclaude:ci-${{ matrix.variant }}
          platforms: linux/amd64
          build-args: VARIANT=${{ matrix.variant }}
          cache-from: |
            type=gha,scope=ci-${{ matrix.variant }}
            type=gha,scope=master-${{ matrix.variant }}-amd64
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.variant }}

      - name: Smoke test
        run: ./scripts/ci/smoke-test.sh holyclaude:ci-${{ matrix.variant }}

      - name: Trivy scan (HIGH,CRITICAL)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: holyclaude:ci-${{ matrix.variant }}
          format: sarif
          output: trivy-${{ matrix.variant }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.variant)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}
