# =============================================================================
# manifest-bump (thin wrapper) — see workflow-arsenal/manifest-bump.yml
# =============================================================================
# Called from build.yml after a successful publish. Opens (or updates) a PR
# in fulviofreitas/ff-k8s pinning the new image tag.
#
# Required secret on this repo:
#   FF_K8S_PR_TOKEN — fine-grained PAT with contents:write + pull-requests:write
#                     on fulviofreitas/ff-k8s

name: manifest-bump

on:
  workflow_call:
    inputs:
      image-tag:
        description: "Image tag to pin (e.g. 1.2.2-fork.3)"
        required: true
        type: string
      cloudcli-version:
        description: "Vendored CloudCLI version (for PR body)"
        required: true
        type: string
      sha:
        description: "Source commit SHA (for PR body)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to pin"
        required: true
        type: string
      cloudcli-version:
        description: "Vendored CloudCLI version"
        required: false
        default: "(manual)"
        type: string
      sha:
        description: "Source commit SHA"
        required: false
        default: "(manual)"
        type: string

jobs:
  bump:
    uses: fulviofreitas/workflow-arsenal/.github/workflows/manifest-bump.yml@master
    with:
      downstream-repo: fulviofreitas/ff-k8s
      downstream-branch: master
      manifest-path: k8s-homelab/kubernetes/apps/holyclaude/deployment.yaml
      image-name: ghcr.io/${{ github.repository_owner }}/holyclaude
      image-tag: ${{ inputs.image-tag }}
      pr-title: "chore(holyclaude): bump image to ${{ inputs.image-tag }}"
      pr-body: |
        ## HolyClaude image bump

        | | |
        |---|---|
        | New image | `ghcr.io/${{ github.repository_owner }}/holyclaude:${{ inputs.image-tag }}` |
        | CloudCLI bundled | `${{ inputs.cloudcli-version }}` |
        | Source commit | `${{ inputs.sha }}` |

        ArgoCD will reconcile after merge.
      pr-labels: "autoupdate,holyclaude"
      pr-assignees: fulviofreitas
    secrets:
      downstream-token: ${{ secrets.FF_K8S_PR_TOKEN }}
